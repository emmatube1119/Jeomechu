<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">

    <!-- SEO -->
    <title>저메추 | 오늘 저녁 메뉴 추천</title>
    <meta name="description" content="오늘 저녁 뭐 먹지? 저메추가 날씨, 시간, 기분에 맞는 최고의 저녁 메뉴를 추천해 드립니다. 랜덤 추천 & 꿀조합 기능 제공!">
    <meta name="keywords" content="저녁메뉴추천, 오늘뭐먹지, 메뉴추천, 저메추, 식당추천">
    <meta name="theme-color" content="#0a0b1e">

    <!-- OG (Open Graph) -->
    <meta property="og:type" content="website">
    <meta property="og:title" content="저메추 | 오늘 저녁 메뉴 추천">
    <meta property="og:description" content="날씨와 기분에 맞는 저녁 메뉴, 저메추가 추천해 드려요!">
    <meta property="og:url" content="https://jemechu.app">
    <meta property="og:image" content="/og-image.png">
    <meta name="twitter:card" content="summary_large_image">

    <!-- PWA -->
    <link rel="manifest" href="/manifest.json">
    <link rel="apple-touch-icon" href="/icon-192.png">
</head>
<body>
    <!-- Toast Container -->
    <div id="toast-container" aria-live="polite"></div>

    <div id="app">
        <div class="background-canvas">
            <div class="bg-img"></div>
            <div class="mood-overlay" id="mood-overlay"></div>
        </div>

        <header>
            <h1 class="logo" aria-label="저메추">저.메.추</h1>
            <p class="subtitle" id="weather-status">오늘 저녁 메뉴, 고민하지 말고 돌려보세요!</p>
        </header>

        <nav class="mode-tabs" role="tablist" aria-label="추천 모드 선택">
            <button id="mode-random" class="tab-btn active" role="tab" aria-selected="true">🎲 랜덤 추천</button>
            <button id="mode-mix" class="tab-btn" role="tab" aria-selected="false">🧪 꿀조합</button>
            <button id="mode-favorites" class="tab-btn" role="tab" aria-selected="false">⭐ 보관함</button>
        </nav>

        <main>
            <div class="glass-card" id="main-card">

                <!-- Random Mode -->
                <div id="random-view" class="view-container" role="tabpanel">
                    <div class="category-selector" role="group" aria-label="카테고리 선택">
                        <button class="cat-btn active" data-category="all">전체</button>
                        <button class="cat-btn" data-category="korean">한식</button>
                        <button class="cat-btn" data-category="western">양식</button>
                        <button class="cat-btn" data-category="chinese">중식</button>
                        <button class="cat-btn" data-category="japanese">일식</button>
                        <button class="cat-btn" data-category="spicy">매콤</button>
                        <button class="cat-btn" data-category="light">가벼움</button>
                        <button class="cat-btn" data-category="night">야식</button>
                    </div>
                </div>

                <!-- Mix Mode -->
                <div id="mix-view" class="view-container hidden-view" role="tabpanel">
                    <div class="mix-selector">
                        <div class="mix-group">
                            <h4>🥩 주재료 선택</h4>
                            <div class="btn-grid">
                                <button class="ing-btn" data-ing="meat">고기</button>
                                <button class="ing-btn" data-ing="seafood">해산물</button>
                                <button class="ing-btn" data-ing="veggie">채소</button>
                                <button class="ing-btn" data-ing="noodle">면</button>
                                <button class="ing-btn" data-ing="dough">빵/떡</button>
                                <button class="ing-btn" data-ing="rice">밥</button>
                            </div>
                        </div>
                        <div class="mix-group">
                            <h4>🔥 조리 방식</h4>
                            <div class="btn-grid">
                                <button class="method-btn" data-method="stew">국물/찜</button>
                                <button class="method-btn" data-method="fry">볶음/튀김</button>
                                <button class="method-btn" data-method="grill">구이</button>
                                <button class="method-btn" data-method="raw">생것/회</button>
                                <button class="method-btn" data-method="mix">무침/비빔</button>
                            </div>
                        </div>
                    </div>
                </div>

                <!-- Favorites Mode -->
                <div id="favorites-view" class="view-container hidden-view" role="tabpanel">
                    <div id="favorites-list" class="favorites-list">
                        <p class="empty-msg">⭐ 아직 보관된 메뉴가 없어요.<br>추천 결과에서 별표를 눌러 저장하세요!</p>
                    </div>
                    <button id="clear-favorites-btn" class="ghost-btn" style="display:none">보관함 비우기</button>
                </div>

                <!-- Shared: Slot Machine -->
                <div class="slot-machine" id="slot-machine-area">
                    <div class="slot-shim slot-shim-top"></div>
                    <div class="slot-container">
                        <div id="slot-inner" class="slot-inner">
                            <div class="slot-item">준비 중...</div>
                        </div>
                    </div>
                    <div class="slot-shim slot-shim-bottom"></div>
                </div>

                <div class="controls">
                    <button id="spin-btn" class="main-btn" aria-label="메뉴 추천받기">
                        <span class="btn-icon">🎲</span>
                        <span class="btn-text">메뉴 추천받기!</span>
                    </button>
                </div>
            </div>
        </main>

        <!-- Result Modal -->
        <section id="result-modal" class="modal hidden" role="dialog" aria-modal="true" aria-label="추천 결과">
            <div class="modal-content glass-card">
                <div class="modal-emoji" id="result-emoji">🍽️</div>
                <h2 class="modal-title">오늘의 저녁은...</h2>
                <div class="result-display">
                    <span id="final-menu" class="highlight">비빔밥</span>
                </div>

                <div class="reaction-bar">
                    <button class="reaction-btn" id="like-btn" aria-label="좋아요">
                        👍 <span>좋아!</span>
                    </button>
                    <button class="reaction-btn" id="dislike-btn" aria-label="싫어요">
                        👎 <span>별로...</span>
                    </button>
                    <button class="reaction-btn" id="favorite-btn" aria-label="즐겨찾기 저장">
                        ⭐ <span>보관</span>
                    </button>
                </div>

                <div class="modal-actions">
                    <button id="map-btn" class="action-btn map-btn" aria-label="근처 식당 찾기">
                        📍 근처 식당 찾기
                    </button>
                    <button id="share-btn" class="action-btn share-btn" aria-label="결과 공유하기">
                        📸 공유하기
                    </button>
                </div>
                <div id="nearby-restaurants" class="nearby-list hidden"></div>
                <button id="retry-btn" class="ghost-btn" aria-label="다시 추천받기">다시 돌리기</button>
            </div>
        </section>

        <!-- Contact Section -->
        <section class="contact-section">
            <div class="glass-card contact-card">
                <h3>📮 문의하기</h3>
                <p>앱에 대한 피드백이나 메뉴 추가를 제안해주세요!</p>
                <form id="contact-form" action="https://formspree.io/f/mnjolrrn" method="POST" class="contact-form">
                    <input type="email" name="email" placeholder="이메일 주소" required autocomplete="email">
                    <textarea name="message" placeholder="문의 내용을 입력하세요" required></textarea>
                    <button type="submit" class="form-btn">보내기 ✉️</button>
                </form>
            </div>
        </section>

        <footer>
            <p>© 2026 저메추 AI · 오늘도 맛있게 드세요 🍽️</p>
        </footer>
    </div>

    <!-- Hidden Canvas for Share -->
    <canvas id="share-canvas" style="display:none" width="600" height="400"></canvas>

    <script type="module" src="/main.js"></script>
</body>
</html>
